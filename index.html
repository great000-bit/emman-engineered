<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="theme-color" content="#000324" />

    <!--
      Only a bare title + description live here as a no-JS / pre-mount fallback (a crawler
      or browser tab that never executes JS still sees something correct for the homepage).
      Everything else — keywords, robots, canonical, hreflang, OG, Twitter, and JSON-LD — is
      intentionally NOT duplicated here: react-helmet-async does not dedupe its tags against
      tags that already exist in the static HTML (verified empirically — every one of those
      tag types rendered twice when present both here and in src/components/SEO.tsx). Each
      route's <SEO> component is the single source of truth for all of that; adding it here
      too just produces duplicate/conflicting tags for every route except this exact one.
    -->
    <title>Creative Emman Limited | Global Creative & Technology Agency</title>
    <meta name="description" content="Creative Emman Limited is a global creative and technology agency helping startups, businesses, and organizations build websites, brand identities, UI/UX experiences, content systems, video assets, motion graphics, and digital growth solutions." />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
